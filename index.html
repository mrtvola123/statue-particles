<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liberty Particles</title>
  </head>
  <body>
    <main id="app">
      <canvas id="liberty-canvas" aria-label="Interactive 3D particle Statue of Liberty"></canvas>
      <div id="sky-fireworks" class="sky-fireworks" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <section class="hud" aria-live="polite">
        <p class="eyebrow">THREE.JS PARTICLE STUDY</p>
        <h1>Liberty Particles</h1>
        <div class="toolbar">
          <button id="toggle-button" type="button" aria-label="Toggle particle disintegration">
            <span class="button-icon" aria-hidden="true">✦</span>
            <span id="button-label">Disintegrate</span>
          </button>
          <p id="state-label">Loading scan</p>
        </div>
      </section>
      <p class="credit">
        Model source:
        <a href="https://github.com/jscastro76/threebox" target="_blank" rel="noreferrer">Threebox</a>,
        after
        <a href="https://sketchfab.com/hellolucy2" target="_blank" rel="noreferrer">hellolucy2</a>
      </p>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
